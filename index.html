<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="To-Do List Life Dashboard — a personal productivity dashboard" />
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

    <!-- ===================== HEADER ===================== -->
    <header class="site-header">
      <div class="header-inner">
        <span class="app-title">Life Dashboard</span>
        <button id="theme-toggle" class="btn-icon" aria-label="Toggle light/dark mode">
          🌙
        </button>
      </div>
    </header>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main class="dashboard">

      <!-- ---- GREETING SECTION ---- -->
      <section id="greeting" class="card greeting-card" aria-label="Greeting">
        <h1 id="greeting-text" class="greeting-text">Good Morning!</h1>
        <div class="name-edit">
          <input
            type="text"
            id="name-input"
            class="name-input"
            placeholder="Enter your name"
            aria-label="Your name"
            maxlength="40"
          />
          <button id="save-name" class="btn btn-primary" aria-label="Save name">
            Save
          </button>
        </div>
      </section>

      <!-- ---- DATE AND TIME SECTION ---- -->
      <section id="datetime" class="card datetime-card" aria-label="Date and time">
        <p id="clock" class="clock" aria-live="polite" aria-label="Current time">
          00:00:00
        </p>
        <p id="date" class="date" aria-label="Current date">
          Thursday, January 1, 2026
        </p>
      </section>

      <!-- ---- FOCUS TIMER SECTION ---- -->
      <section id="timer" class="card timer-card" aria-label="Focus timer">
        <h2 class="section-title">Focus Timer</h2>
        <p id="timer-display" class="timer-display" aria-live="polite" aria-label="Timer countdown">
          25:00
        </p>
        <div class="timer-controls">
          <button id="start-btn" class="btn btn-start" aria-label="Start timer">
            Start
          </button>
          <button id="stop-btn" class="btn btn-stop" aria-label="Pause timer" disabled>
            Stop
          </button>
          <button id="reset-btn" class="btn btn-reset" aria-label="Reset timer">
            Reset
          </button>
        </div>
      </section>

      <!-- ---- TO-DO LIST SECTION ---- -->
      <section id="todo" class="card todo-card" aria-label="To-do list">
        <h2 class="section-title">To-Do List</h2>

        <!-- Task input -->
        <div class="task-input-row">
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="Add a new task…"
            aria-label="New task"
            maxlength="200"
          />
          <button id="add-task-btn" class="btn btn-primary" aria-label="Add task">
            Add
          </button>
        </div>

        <!-- Duplicate error message -->
        <p id="task-error" class="task-error" role="alert" aria-live="assertive">
          Task already exists.
        </p>

        <!-- Task list -->
        <ul id="task-list" class="task-list" aria-label="Task list">
          <!-- Tasks injected by JavaScript -->
        </ul>
      </section>

      <!-- ---- QUICK LINKS SECTION ---- -->
      <section id="links" class="card links-card" aria-label="Quick links">
        <h2 class="section-title">Quick Links</h2>

        <!-- Link input -->
        <div class="link-input-row">
          <input
            type="text"
            id="link-name"
            class="link-input"
            placeholder="Link name"
            aria-label="Link name"
            maxlength="50"
          />
          <input
            type="url"
            id="link-url"
            class="link-input"
            placeholder="https://example.com"
            aria-label="Link URL"
            maxlength="500"
          />
          <button id="add-link-btn" class="btn btn-primary" aria-label="Add link">
            Add
          </button>
        </div>

        <!-- Links container -->
        <div id="links-container" class="links-container" aria-label="Saved links">
          <!-- Link buttons injected by JavaScript -->
        </div>
      </section>

    </main>

    <!-- ===================== FOOTER ===================== -->
    <footer class="site-footer">
      <p>&copy; 2026 Life Dashboard</p>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
